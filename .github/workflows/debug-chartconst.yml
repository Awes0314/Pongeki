name: Debug - 譜面定数取得確認

on:
  workflow_dispatch:

jobs:
  debug-chartconst:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: batch
        run: npm ci

      - name: Build batch
        working-directory: batch
        run: npm run build

      - name: Run debug chartconst
        working-directory: batch
        run: npm run debug:chartconst
